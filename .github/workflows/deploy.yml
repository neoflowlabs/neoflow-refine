name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Create index.html for GitHub Pages
        run: |
          JS_FILE=$(find dist/client/assets -name "index-*.js" | head -n 1)
          CSS_FILE=$(find dist/client/assets -name "styles-*.css" | head -n 1)

          JS_FILE=${JS_FILE#dist/client/}
          CSS_FILE=${CSS_FILE#dist/client/}

          cat > dist/client/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>NeoFlow Labs</title>
              <script type="module" crossorigin src="/$JS_FILE"></script>
              <link rel="stylesheet" crossorigin href="/$CSS_FILE">
            </head>
            <body>
              <div id="root"></div>
            </body>
          </html>
          EOF

          touch dist/client/.nojekyll
          ls -la dist/client

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4