name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Diagnostic - List all files
        run: |
          echo "Searching for index.html..."
          find . -name "index.html"
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This 'find' logic will help us see if the path is actually:
          # './.output/public' OR './dist' OR './.vinxi/build/client'
          path: './.output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4